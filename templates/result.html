<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Résultat</title>
    <style>
      body { font-family: system-ui, sans-serif; margin: 2rem; }
      img { max-width: 420px; border-radius: 10px; display: block; margin-bottom: 1rem; }
      .pill { padding:.5rem 1rem; margin-right:.5rem; border-radius:999px; border:1px solid #aaa; background:#f5f5f5; opacity:.6; }
      .btn { padding:.6rem 1rem; border-radius:8px; border:1px solid #222; background:#fff; text-decoration:none; }
    </style>
  </head>
  <body>
    <h1>Résultat</h1>
    <img src="{{ image_data_url }}" alt="submitted image" />
    <h2>Classe prédite : {{ predicted_label }}</h2>
    <p>Confiance : {{ '%.3f'|format(confidence) }}</p>

    <form method="post" action="/feedback">
      <p>Selon vous, quelle est la bonne catégorie ?</p>
      <input type="radio" id="desert" name="category" value="desert">
      <label for="desert">Desert</label>
      <input type="radio" id="forest" name="category" value="forest">
      <label for="forest">Forest</label>
      <input type="radio" id="meadow" name="category" value="meadow">
      <label for="medow">Meadow</label>
      <input type="radio" id="mountain" name="category" value="mountain">
      <label for="mountain">Mountain</label>
      <br>
      <input type="text" name="ma_variable_a_recuperer" value="{{ ma_variable_sur_la_page }}" hidden>
      <input type="test" name="predicted_label" value="{{ predicted_label }}" hidden>
      <input type="test" name="confidence" value="{{ confidence }}" hidden>
      <input type="test" name="image_data_url" value="{{ image_data_url }}" hidden>
      <button type="submit" class = "btn">Envoyer un feedback</button>
    </form>

    <!-- <p><a class="btn" href="/feedback">Envoyer un feedback (mock)</a></p> -->
    <p><a href="/">↩︎ Revenir</a></p>
  </body>
</html>
